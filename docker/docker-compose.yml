services:
  dns-server:
    build:
      context: ../
      dockerfile: docker/Dockerfile
      target: production
    image: dns-server:latest
    container_name: dns-server
    restart: unless-stopped
    # host networking so the server sees real client IPs in query logs
    # and can bind port 53 without a separate port mapping
    network_mode: host
    volumes:
      - dns-data:/app/data
    # All config is via CLI flags — no env vars needed
    # Override individual flags here if needed, e.g.:
    #   command: ["./dns-server", "--upstream", "9.9.9.9:53", "--log-prune", "168h"]

volumes:
  dns-data:
