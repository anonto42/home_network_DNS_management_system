repos:
  - repo: https://github.com/pre-commit/pre-commit-hooks
    rev: v4.6.0
    hooks:
      - id: trailing-whitespace
      - id: end-of-file-fixer
      - id: check-yaml
      - id: check-merge-conflict

  - repo: local
    hooks:
      - id: lint-backend
        name: Lint Go code
        entry: bash -c 'export PATH="$HOME/go/bin:$PATH"; cd backend && golangci-lint run ./...'
        language: system
        files: ^backend/.*\.go$
        pass_filenames: false

      - id: lint-frontend
        name: Lint TypeScript/React
        entry: bash -c 'cd frontend && npx tsc --noEmit'
        language: system
        files: ^frontend/src/.*\.(ts|tsx)$
        pass_filenames: false

      - id: test-backend
        name: Run Go tests
        entry: bash -c 'cd backend && go test ./...'
        language: system
        files: ^backend/.*\.go$
        pass_filenames: false
